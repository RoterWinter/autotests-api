//Этот файл использует третью версию (proto3) Protocol Buffers —
//формата сериализации данных, который используется в gRPC.
syntax = "proto3";

//определяет область видимости сообщений и сервисов. Это помогает избежать конфликтов имен
//особенно если в системе используется несколько .proto-файлов.
package userservice;

// Определяем сообщение запроса
//Число 1 — это метка поля (field number), которая используется для сериализации данных.
message GetUserRequest {
  string username = 1;
}

// Определяем сообщение ответа
message GetUserResponse {
  string message = 1;
}

// Определяем gRPC-сервис
service UserService {
  // Определяем метод gRPC-сервиса
  rpc GetUser (GetUserRequest) returns (GetUserResponse);
}
